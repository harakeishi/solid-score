SolidScore/TotalScore:
  Description: "Checks that each class/module meets a minimum SOLID total score."
  Enabled: true
  MinScore: 70
  Weights:
    srp: 0.30
    ocp: 0.15
    lsp: 0.10
    isp: 0.20
    dip: 0.25
  DipWhitelist: []

