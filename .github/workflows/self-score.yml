name: SOLID Score Analysis

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed Ruby files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="origin/main"
          fi

          CHANGED_FILES=$(git diff --name-only --diff-filter=ACMR "$BASE_SHA"...HEAD -- '*.rb' | grep -v '^spec/' | grep -v '^test/' || true)

          if [ -z "$CHANGED_FILES" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No Ruby files changed, skipping analysis."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            # Save file list (newline-separated -> space-separated)
            FILES=$(echo "$CHANGED_FILES" | tr '\n' ' ')
            echo "files=$FILES" >> "$GITHUB_OUTPUT"
            echo "Changed Ruby files: $FILES"
          fi

      - name: Set up Ruby
        if: steps.changed.outputs.skip != 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Run solid-score (current)
        if: steps.changed.outputs.skip != 'true'
        id: current
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          JSON_OUTPUT=$(bundle exec solid-score $CHANGED_FILES --format json --min-score 0) || true
          {
            echo "json<<SOLID_SCORE_EOF"
            echo "$JSON_OUTPUT"
            echo "SOLID_SCORE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run solid-score (base - main)
        if: steps.changed.outputs.skip != 'true'
        id: base
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="origin/main"
          fi

          # Checkout base versions of changed files
          git stash --include-untracked || true
          for f in $CHANGED_FILES; do
            git checkout "$BASE_SHA" -- "$f" 2>/dev/null || true
          done

          # Only analyze files that existed in base (new files won't exist)
          EXISTING=""
          for f in $CHANGED_FILES; do
            if [ -f "$f" ]; then
              EXISTING="$EXISTING $f"
            fi
          done

          if [ -n "$EXISTING" ]; then
            BASE_JSON=$(bundle exec solid-score $EXISTING --format json --min-score 0 2>/dev/null) || true
          else
            BASE_JSON="{}"
          fi

          git checkout HEAD -- . || true
          git stash pop || true

          {
            echo "json<<SOLID_SCORE_EOF"
            echo "$BASE_JSON"
            echo "SOLID_SCORE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Compare scores and generate comment
        if: steps.changed.outputs.skip != 'true'
        id: compare
        shell: ruby {0}
        env:
          CURRENT_JSON: ${{ steps.current.outputs.json }}
          BASE_JSON: ${{ steps.base.outputs.json }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          require "json"

          current = JSON.parse(ENV["CURRENT_JSON"]) rescue {}
          base = JSON.parse(ENV["BASE_JSON"]) rescue {}

          current_avg = current.dig("summary", "average_score") || 0.0
          base_avg = base.dig("summary", "average_score") || 0.0
          diff = (current_avg - base_avg).round(2)

          changed_files = (ENV["CHANGED_FILES"] || "").split
          current_classes = (current["classes"] || []).sort_by { |c| c["total"] }
          base_map = (base["classes"] || []).each_with_object({}) { |c, h| h[c["class_name"]] = c["total"] }

          degraded = false
          lines = []
          lines << "<!-- solid-score-report -->"

          emoji = current_avg >= 80 ? "\u{1f7e2}" : current_avg >= 50 ? "\u{1f7e1}" : "\u{1f534}"
          lines << "## #{emoji} solid-score Report"
          lines << ""
          lines << "<details><summary>Analyzed #{changed_files.size} changed file(s)</summary>"
          lines << ""
          changed_files.each { |f| lines << "- `#{f}`" }
          lines << "</details>"
          lines << ""

          # Summary
          diff_str = diff >= 0 ? "+#{diff}" : diff.to_s
          diff_emoji = diff > 0 ? "\u{1f4c8}" : diff < 0 ? "\u{1f4c9}" : "\u{2796}"
          lines << "**Average: #{current_avg}** (#{diff_emoji} #{diff_str} vs main) | Classes: #{current_classes.size}"
          lines << ""

          if current_classes.any?
            lines << "| Class | SRP | OCP | LSP | ISP | DIP | Total | vs main |"
            lines << "|-------|-----|-----|-----|-----|-----|-------|---------|"

            current_classes.first(30).each do |c|
              total = c["total"]
              class_name = c["class_name"]
              prev = base_map[class_name]
              class_diff = prev ? (total - prev).round(2) : nil

              if prev && class_diff < -1
                degraded = true
              end

              e = total >= 80 ? "\u{1f7e2}" : total >= 50 ? "\u{1f7e1}" : "\u{1f534}"
              diff_col = if prev.nil?
                           "NEW"
                         elsif class_diff > 0
                           "+#{class_diff}"
                         elsif class_diff < 0
                           class_diff.to_s
                         else
                           "-"
                         end

              lines << "| #{class_name} | #{c['srp']} | #{c['ocp']} | #{c['lsp']} | #{c['isp']} | #{c['dip']} | #{e} #{total} | #{diff_col} |"
            end
          end

          lines << ""
          if degraded
            lines << "> \u{26a0}\u{fe0f} **Score degradation detected!** Some classes have decreased by more than 1 point vs main."
          else
            lines << "> \u{2705} No score degradation detected."
          end

          lines << ""
          version = current["version"] || "unknown"
          lines << "<sub>Generated by solid-score v#{version}</sub>"

          comment = lines.join("\n")

          # Write outputs
          File.open(ENV["GITHUB_OUTPUT"], "a") do |f|
            f.puts "comment<<SOLID_SCORE_EOF"
            f.puts comment
            f.puts "SOLID_SCORE_EOF"
            f.puts "degraded=#{degraded}"
            f.puts "current_avg=#{current_avg}"
            f.puts "base_avg=#{base_avg}"
          end

      - name: Post PR comment
        if: github.event_name == 'pull_request' && steps.changed.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          COMMENT: ${{ steps.compare.outputs.comment }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          EXISTING_COMMENT_ID=$(gh api \
            "repos/${{ github.repository }}/issues/$PR_NUMBER/comments" \
            --jq '.[] | select(.body | contains("<!-- solid-score-report -->")) | .id' \
            2>/dev/null | head -1)

          if [ -n "$EXISTING_COMMENT_ID" ]; then
            gh api \
              --method PATCH \
              "repos/${{ github.repository }}/issues/comments/$EXISTING_COMMENT_ID" \
              -f body="$COMMENT"
          else
            gh pr comment "$PR_NUMBER" --body "$COMMENT"
          fi

      - name: Post commit comment (push)
        if: github.event_name == 'push' && steps.changed.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          COMMENT: ${{ steps.compare.outputs.comment }}
          SHA: ${{ github.sha }}
        run: |
          gh api \
            "repos/${{ github.repository }}/commits/$SHA/comments" \
            -f body="$COMMENT"

      - name: Fail if degraded
        if: steps.changed.outputs.skip != 'true' && steps.compare.outputs.degraded == 'true'
        run: |
          echo "::error::SOLID score degradation detected! Current: ${{ steps.compare.outputs.current_avg }}, Base: ${{ steps.compare.outputs.base_avg }}"
          exit 1
